version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jinanam
      POSTGRES_PASSWORD: jinanam
      POSTGRES_DB: jinanam
    ports:
      - '5432:5432'
    volumes:
      - jinanam_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jinanam']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - jinanam_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: build
    command: sh -c "npx prisma migrate deploy && npx tsx watch src/server.ts"
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://jinanam:jinanam@postgres:5432/jinanam?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app

  worker:
    build:
      context: .
      target: build
    command: sh -c "npx tsx watch src/jobs/worker.ts"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://jinanam:jinanam@postgres:5432/jinanam?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app

volumes:
  jinanam_pg_data:
  jinanam_redis_data:
